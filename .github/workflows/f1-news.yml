name: Build F1 news feed

on:
  schedule:
    # every 6 hours (UTC). 02:00 / 08:00 / 14:00 / 20:00 UTC
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch:        # lets you run it by hand from the Actions tab

permissions:
  contents: write           # needed to commit news.json back to the repo

concurrency:
  group: f1-news
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build news.json
        run: python scripts/build_news.py

      - name: Commit if changed
        run: |
          git config user.name  "f1-news-bot"
          git config user.email "actions@github.com"
          git add news.json
          if git diff --staged --quiet; then
            echo "No change to news.json"
          else
            git commit -m "news: refresh $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
