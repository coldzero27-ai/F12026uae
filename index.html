<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>F1 2026 · World Calendar Globe</title>
<style>
  :root{
    --ember:#ff2d2d; --ember-soft:#ff6b6b; --steel:#4a9eff; --steel-soft:#7bbcff;
    --ink:#f2f4f7; --ink-dim:#9aa3b2; --ink-faint:#5b6475;
    --glass:rgba(14,18,25,.62); --glass-2:rgba(18,23,31,.72); --glass-border:rgba(255,255,255,.10);
    --done:#3a4250;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;width:100%;overflow:hidden;background:#06080c;color:var(--ink);
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;-webkit-font-smoothing:antialiased}

  /* ===== theming ===== */
  body.light{background:#dfe7f2;color:#16202e}
  #bg{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;}
  body.light #bg{opacity:0;}
  #lightbg{position:fixed;inset:0;z-index:0;opacity:0;transition:opacity .4s;
    background:radial-gradient(circle at 50% 38%, #f2f7ff 0%, #cdd9ec 45%, #aebfd9 100%);}
  body.light #lightbg{opacity:1;}

  #scaler{position:fixed;top:0;left:0;transform-origin:top left;z-index:1;}
  #stage{position:relative;width:1920px;height:1080px;}

  canvas#globe{position:absolute;inset:0;display:block;}

  /* ===== fit/scale base: stage is 1920x1080, scaled to fit ===== */

  /* ===== panels ===== */
  .panel{position:absolute;background:var(--glass);border:1px solid var(--glass-border);
    border-radius:16px;backdrop-filter:blur(14px);box-shadow:0 18px 50px rgba(0,0,0,.45);overflow:hidden;}
  body.light .panel{background:rgba(255,255,255,.7);border-color:rgba(20,40,70,.12);box-shadow:0 18px 50px rgba(60,90,140,.18);}
  .panel h2{font-size:15px;letter-spacing:2.5px;text-transform:uppercase;color:var(--ink-faint);
    padding:16px 20px 10px;font-weight:700;}
  body.light .panel h2{color:#5a6a82;}

  /* schedule (left, tall) — all 24 rows fit, no scroll */
  #schedule{left:40px;top:120px;width:360px;height:900px;display:flex;flex-direction:column;}
  #schedule .rows{flex:1;display:flex;flex-direction:column;justify-content:space-between;
    overflow:hidden;padding:4px 12px 12px;}
  .srow{display:flex;align-items:center;gap:10px;padding:0 10px;border-radius:9px;cursor:pointer;
    transition:background .15s;flex:1;min-height:0;}
  .srow:hover{background:rgba(255,255,255,.06);}
  body.light .srow:hover{background:rgba(40,70,120,.07);}
  .srow .rnd{font-size:11.5px;color:var(--ink-faint);width:22px;font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .srow .fl{font-size:16px;flex:0 0 auto;width:22px;text-align:center;}
  .srow .nm{font-size:13.5px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
  .srow .dt{font-size:11px;color:var(--ink-dim);flex:0 0 auto;font-variant-numeric:tabular-nums;width:48px;text-align:right;}
  .srow .pip{width:7px;height:7px;border-radius:50%;flex:0 0 auto;}
  .srow.done{opacity:.5;} .srow.done .fl{filter:grayscale(.7);}
  .srow.next{background:rgba(255,45,45,.14);border:1px solid rgba(255,196,0,.55);}
  .srow.next .nm{color:#ffd24a;font-weight:800;}
  .pip.done{background:var(--done);} .pip.next{background:var(--ember);box-shadow:0 0 8px var(--ember);} .pip.upcoming{background:var(--steel);}

  /* standings (right top + bottom) */
  #drivers{right:40px;top:90px;width:360px;height:455px;}
  #teams{right:40px;top:565px;width:360px;height:425px;}
  .trow{display:flex;align-items:center;gap:11px;padding:7px 20px;}
  .trow .pos{font-size:13px;color:var(--ink-faint);width:20px;font-variant-numeric:tabular-nums;flex:0 0 auto;}
  .trow .bar{width:4px;height:22px;border-radius:2px;flex:0 0 auto;background:var(--steel);}
  .trow .who{flex:1;font-size:14.5px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .trow .who small{display:block;font-size:11.5px;font-weight:400;color:var(--ink-dim);}
  .trow .pts{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;}
  .trow .pts small{font-size:10px;color:var(--ink-faint);font-weight:400;margin-left:2px;}
  .loading,.err{padding:16px 20px;font-size:13px;color:var(--ink-faint);}
  /* real SVG flags */
  .flag{display:inline-block;width:24px;height:16px;border-radius:2px;overflow:hidden;flex:0 0 auto;
    box-shadow:0 0 0 1px rgba(255,255,255,.18);vertical-align:middle;}
  .flag svg{display:block;width:100%;height:100%;}
  body.light .flag{box-shadow:0 0 0 1px rgba(20,40,70,.2);}
  /* bold standings mode = full coloured row */
  #drivers.bold .trow,#teams.bold .trow{margin:2px 10px;border-radius:9px;padding:7px 14px;}
  #drivers.bold .trow .bar,#teams.bold .trow .bar{display:none;}
  /* hide scrollbars everywhere (TV display) */
  *::-webkit-scrollbar{width:0;height:0;display:none;}
  *{scrollbar-width:none;-ms-overflow-style:none;}

  /* countdown strip under globe */
  #countdown{position:absolute;left:50%;bottom:40px;transform:translateX(-50%);
    display:flex;align-items:center;gap:18px;background:var(--glass-2);
    border:1px solid var(--glass-border);border-radius:40px;padding:12px 28px;backdrop-filter:blur(14px);}
  body.light #countdown{background:rgba(255,255,255,.75);border-color:rgba(20,40,70,.12);}
  #countdown .lbl{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);}
  #countdown .gp{font-size:16px;font-weight:800;}
  #countdown .fl{font-size:20px;}
  #countdown .clock{font-size:18px;font-weight:800;color:var(--ember-soft);font-variant-numeric:tabular-nums;}
  body.light #countdown .clock{color:#d11;}

  /* floating card */
  #cardLayer{position:absolute;inset:0;z-index:5;pointer-events:none;}
  #lineLayer{position:absolute;inset:0;z-index:4;pointer-events:none;}
  .fcard{position:absolute;width:300px;background:var(--glass-2);border:1px solid var(--glass-border);
    border-radius:18px;padding:20px 22px;backdrop-filter:blur(18px);box-shadow:0 22px 60px rgba(0,0,0,.6);
    opacity:0;transform:translateY(10px) scale(.96);transition:opacity .5s,transform .5s;will-change:transform;}
  body.light .fcard{background:rgba(255,255,255,.86);border-color:rgba(20,40,70,.14);box-shadow:0 22px 60px rgba(40,70,120,.28);}
  .fcard.show{opacity:1;transform:none;}
  .fcard .top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:14px;}
  .fcard .eyebrow{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);}
  .fcard .status{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:20px;}
  .status.next{background:rgba(255,45,45,.18);color:var(--ember-soft);border:1px solid rgba(255,45,45,.4);}
  .status.done{background:rgba(58,66,80,.4);color:var(--ink-dim);border:1px solid var(--glass-border);}
  .status.upcoming{background:rgba(74,158,255,.16);color:var(--steel-soft);border:1px solid rgba(74,158,255,.36);}
  .fcard .gp{font-size:24px;font-weight:800;letter-spacing:-.4px;line-height:1.05;display:flex;align-items:center;gap:9px;}
  .fcard .gp .fl{font-size:26px;}
  .fcard .sub{font-size:13px;color:var(--ink-dim);margin:4px 0 2px;}
  .fcard .dates{font-size:12.5px;color:var(--ink-faint);margin-bottom:14px;}
  .fcard .cd{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--ember-soft);
    background:rgba(255,45,45,.1);border-radius:10px;padding:8px 12px;margin-bottom:14px;}
  .fcard .schead{font-size:10.5px;letter-spacing:2px;text-transform:uppercase;color:var(--ink-faint);margin-bottom:4px;}
  .fcard .sess{display:flex;justify-content:space-between;font-size:13px;padding:5px 0;border-top:1px solid rgba(255,255,255,.07);}
  body.light .fcard .sess{border-top-color:rgba(20,40,70,.1);}
  .fcard .sess .n{color:var(--ink-dim);} .fcard .sess .t{font-variant-numeric:tabular-nums;}
  .fcard .sess.race .t{color:var(--ember-soft);font-weight:800;} body.light .fcard .sess.race .t{color:#d11;}
  .fcard .podium{margin-top:6px;}
  .fcard .pod{display:flex;align-items:center;gap:9px;font-size:13.5px;padding:5px 0;border-top:1px solid rgba(255,255,255,.07);}
  body.light .fcard .pod{border-top-color:rgba(20,40,70,.1);}
  .fcard .pod .md{font-size:15px;width:20px;flex:0 0 auto;}
  .fcard .pod .bar{width:4px;height:22px;border-radius:2px;flex:0 0 auto;}
  .fcard .pod .dn{flex:1;font-weight:700;}
  .fcard .pod .tm{font-size:11.5px;color:var(--ink-dim);}
  .fcard .extra{font-size:12px;color:var(--ink-dim);margin-top:10px;padding-top:10px;border-top:1px solid rgba(255,255,255,.07);}
  body.light .fcard .extra{border-top-color:rgba(20,40,70,.1);}
  .fcard .extra div{display:flex;justify-content:space-between;padding:2px 0;}
  .fcard .tz{font-size:10px;color:var(--ink-faint);margin-top:10px;letter-spacing:.5px;}

  /* controls */
  #controls{position:absolute;left:50%;top:30px;transform:translateX(-50%);z-index:6;display:flex;gap:8px;
    background:var(--glass);border:1px solid var(--glass-border);border-radius:13px;padding:7px;backdrop-filter:blur(12px);
    opacity:0;transition:opacity .3s;}
  #controls.show{opacity:1;}
  #controls .grp{display:flex;gap:5px;}
  #controls .sep{width:1px;background:var(--glass-border);margin:2px 4px;}
  #controls button{background:transparent;border:1px solid transparent;color:var(--ink-dim);font-size:12px;
    font-weight:600;letter-spacing:.4px;padding:8px 13px;border-radius:8px;cursor:pointer;transition:all .18s;text-transform:uppercase;}
  #controls button:hover{color:var(--ink);} #controls button.active{background:var(--steel);border-color:var(--steel);color:#06121f;}
  #hotzone{position:absolute;left:0;top:0;width:100%;height:80px;z-index:5;}

  .hoverlabel{position:absolute;z-index:7;pointer-events:none;font-size:13px;font-weight:700;letter-spacing:.5px;
    color:#fff;background:rgba(8,12,18,.85);padding:5px 11px;border-radius:8px;border:1px solid rgba(255,255,255,.14);
    opacity:0;transition:opacity .15s;backdrop-filter:blur(6px);display:flex;align-items:center;gap:7px;}
  .hoverlabel .fl{font-size:15px;}

  /* always-on city labels */
  #cityLabels{position:absolute;inset:0;z-index:3;pointer-events:none;}
  .citylabel{position:absolute;font-size:15px;font-weight:700;letter-spacing:.3px;color:#fff;
    text-shadow:0 1px 4px rgba(0,0,0,.95),0 0 12px rgba(0,0,0,.8);white-space:nowrap;
    transform:translate(-50%,-50%);transition:opacity .25s;will-change:transform,opacity;}
  .citylabel.next{color:#ffd24a;font-weight:800;}
  .citylabel.done{color:#aeb6c4;font-weight:600;}
  body.light .citylabel{color:#10202e;text-shadow:0 1px 4px rgba(255,255,255,.95),0 0 12px rgba(255,255,255,.8);}
  body.light .citylabel.next{color:#c8910a;}

  @media print{
    body{background:#fff !important;color:#000;}
    #bg,#lightbg,#controls,#hotzone{display:none !important;}
    #scaler{position:static !important;transform:none !important;}
    #stage{width:100% !important;height:auto !important;}
  }
</style>
</head>

/* ====== flag emoji from ISO code ====== */
function flagEmoji(cc){
  if(!cc) return "🏁";
  return cc.toUpperCase().replace(/./g, c=>String.fromCodePoint(127397+c.charCodeAt(0)));
}

/* ====== UAE time conversion (UTC -> GST UTC+4) with rollover ====== */
const UAE_OFFSET = 4*60; // minutes
function toUAE(dateStr, timeStr){
  // dateStr "2026-03-08", timeStr "05:00:00Z" (UTC). Returns {date:Date, label, dayLabel}
  if(!dateStr || !timeStr) return null;
  const iso = dateStr+"T"+timeStr.replace("Z","")+"Z"; // force UTC parse
  const d = new Date(iso);
  if(isNaN(d)) return null;
  // shift to UAE
  const uae = new Date(d.getTime() + UAE_OFFSET*60*1000);
  return uae;
}
function fmtUAEtime(uae){
  // uae is a Date already shifted; read UTC fields to avoid local tz
  let h=uae.getUTCHours(), m=uae.getUTCMinutes();
  const hh=String(h).padStart(2,'0'), mm=String(m).padStart(2,'0');
  return hh+":"+mm;
}
const DOW=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
const MON=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
function fmtUAEday(uae){ return DOW[uae.getUTCDay()]; }
function fmtDateRange(uae){ return DOW[uae.getUTCDay()]+" "+uae.getUTCDate()+" "+MON[uae.getUTCMonth()]; }

/* ====== status from date ====== */
function computeStatus(){
  const now = new Date();
  // find the next race whose race date is today or future
  let nextRound = null;
  for(const r of RACES){
    const raceDate = new Date(r.date+"T23:59:59+04:00");
    if(raceDate >= now){ nextRound = r.round; break; }
  }
  RACES.forEach(r=>{
    const raceDate = new Date(r.date+"T23:59:59+04:00");
    if(nextRound!==null && r.round===nextRound) r.status="next";
    else if(raceDate < now) r.status="done";
    else r.status="upcoming";
  });
  return nextRound;
}

function buildTexture(mode,oceanHex){
  const w=2048,h=1024,c=document.createElement("canvas");c.width=w;c.height=h;
  const x=c.getContext("2d");x.fillStyle=oceanHex;x.fillRect(0,0,w,h);
  const proj=(lng,lat)=>[(lng+180)/360*w,(90-lat)/180*h];
  if(mode==="dots"){
    x.fillStyle="#46719c";
    for(const ring of LAND){const path=new Path2D();ring.forEach((p,i)=>{const a=proj(p[0],p[1]);i?path.lineTo(a[0],a[1]):path.moveTo(a[0],a[1]);});path.closePath();
      x.save();x.clip(path);for(let yy=0;yy<h;yy+=9){for(let xx=0;xx<w;xx+=9){x.beginPath();x.arc(xx,yy,1.5,0,7);x.fill();}}x.restore();}
  }else{
    for(const ring of LAND){const path=new Path2D();ring.forEach((p,i)=>{const a=proj(p[0],p[1]);i?path.lineTo(a[0],a[1]):path.moveTo(a[0],a[1]);});path.closePath();
      x.fillStyle="#1d3147";x.fill(path);x.strokeStyle="#3f688f";x.lineWidth=1.5;x.lineJoin="round";x.stroke(path);}
  }
  const t=new THREE.CanvasTexture(c);t.anisotropy=4;return t;
}

const keyLight=new THREE.DirectionalLight(0xffffff,0.7);keyLight.position.set(3,2,4);scene.add(keyLight);

function toVec(lat,lng,radius){const phi=(90-lat)*Math.PI/180,theta=(lng+180)*Math.PI/180;
  return new THREE.Vector3(-radius*Math.sin(phi)*Math.cos(theta),radius*Math.cos(phi),radius*Math.sin(phi)*Math.sin(theta));}

/* markers — vertical beam + checkered flag on top */
const markers=[];
let flagTex=null;
function getFlagTex(){
  if(flagTex) return flagTex;
  const cc=document.createElement("canvas");cc.width=cc.height=32;const cx=cc.getContext("2d");
  for(let i=0;i<4;i++)for(let j=0;j<4;j++){cx.fillStyle=(i+j)%2?"#fff":"#141414";cx.fillRect(i*8,j*8,8,8);}
  flagTex=new THREE.CanvasTexture(cc);return flagTex;
}
function buildMarkers(){
  markers.forEach(m=>globeGroup.remove(m.group));
  markers.length=0;
  RACES.forEach((r,idx)=>{
    const isNext=r.status==="next";
    const col=COLORS[r.status]||COLORS.upcoming;
    const g=new THREE.Group();
    const pos=toVec(r.lat,r.lng,R*1.002);
    const normal=pos.clone().normalize();
    // beam
    const h=isNext?0.40:0.26;
    const beam=new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.016,h,8),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.78,blending:THREE.AdditiveBlending,depthWrite:false}));
    beam.position.y=h/2; g.add(beam);
    // glowing base dot on surface
    const base=new THREE.Mesh(new THREE.CircleGeometry(isNext?0.05:0.034,18),
      new THREE.MeshBasicMaterial({color:col,transparent:true,opacity:0.85,blending:THREE.AdditiveBlending,depthWrite:false}));
    base.rotation.x=-Math.PI/2; base.position.y=0.001; g.add(base);
    // pole + checkered flag at top
    const pole=new THREE.Mesh(new THREE.CylinderGeometry(0.005,0.005,h*0.42,6),
      new THREE.MeshBasicMaterial({color:0xe8e8e8})); pole.position.y=h+h*0.21; g.add(pole);
    const flag=new THREE.Mesh(new THREE.PlaneGeometry(0.11,0.072),
      new THREE.MeshBasicMaterial({map:getFlagTex(),side:THREE.DoubleSide}));
    flag.position.set(0.056,h+h*0.33,0); g.add(flag);
    // gold ring for next race
    if(isNext){
      const ring=new THREE.Mesh(new THREE.RingGeometry(0.07,0.09,24),
        new THREE.MeshBasicMaterial({color:0xffc400,transparent:true,opacity:0.9,side:THREE.DoubleSide,blending:THREE.AdditiveBlending,depthWrite:false}));
      ring.rotation.x=-Math.PI/2; ring.position.y=0.002; g.add(ring);
    }
    // invisible hit sphere for clicking/hover
    const hit=new THREE.Mesh(new THREE.SphereGeometry(0.12,8,8),
      new THREE.MeshBasicMaterial({visible:false}));
    hit.position.y=h*0.5; hit.userData={idx}; g.add(hit);
    // orient group upright on the sphere
    g.position.copy(pos);
    const up=new THREE.Vector3(0,1,0);
    g.quaternion.copy(new THREE.Quaternion().setFromUnitVectors(up,normal));
    globeGroup.add(g);
    markers.push({group:g,beam,base,ring:isNext?g.children.find(c=>c.geometry&&c.geometry.type==="RingGeometry"):null,
      flag,hit,data:r,isNext});
  });
  buildCityLabels();
}

/* raycast + selection */
const ray=new THREE.Raycaster();const mouse=new THREE.Vector2();
let selected=null,targetRotY=null,targetRotX=null;
const cardLayer=document.getElementById("cardLayer"),lineLayer=document.getElementById("lineLayer");
const statusLabel=s=>s==="next"?"Next race":s==="done"?"Completed":"Upcoming";

/* sessions for a race: from live schedule fetch (sessionMap) or null */
const sessionMap={}; // round -> {FP1,FP2,FP3,Q,SQ,SP,R} as UAE Date objects
const resultMap={};  // round -> {podium:[{pos,driver,team}], fastest, pole, laps, dist}

function buildCard(r){
  clearCard();
  const card=document.createElement("div");card.className="fcard";
  const fl=flagSVG(r.flag);
  let html=`<div class="top"><span class="eyebrow">Round ${String(r.round).padStart(2,'0')} / 24</span>
    <span class="status ${r.status}">${statusLabel(r.status)}</span></div>
    <div class="gp">${fl}${r.gp.replace(' Grand Prix','')}</div>
    <div class="sub">${r.circuit}</div>`;
  // dates
  const sess=sessionMap[r.round];
  if(sess && sess.R){ html+=`<div class="dates">Race weekend · ${fmtDateRange(sess.FP1||sess.SQ||sess.R)} – ${fmtDateRange(sess.R)}</div>`; }
  else { html+=`<div class="dates">Race · ${r.date}</div>`; }

  // countdown if next
  if(r.status==="next"){
    const rd = sess&&sess.R ? sess.R : new Date(r.date+"T13:00:00+04:00");
    const days=Math.max(0,Math.ceil((rd-new Date())/(1000*60*60*24)));
    html+=`<div class="cd">⏱ ${days===0?"This weekend":("In "+days+" day"+(days===1?"":"s"))}</div>`;
  }

  if(r.status==="done"){
    const res=resultMap[r.round];
    if(res && res.podium && res.podium.length){
      html+=`<div class="schead">Podium</div><div class="podium">`;
      const md=["🥇","🥈","🥉"];
      res.podium.forEach((p,i)=>{html+=`<div class="pod"><span class="md">${md[i]||""}</span><span class="bar" style="background:${teamColor(p.team)}"></span><span class="dn">${p.driver}<div class="tm">${p.team}</div></span></div>`;});
      html+=`</div>`;
      html+=`<div class="extra">`;
      if(res.pole) html+=`<div><span>Pole</span><span>${res.pole}</span></div>`;
      if(res.fastest) html+=`<div><span>Fastest lap</span><span>${res.fastest}</span></div>`;
      if(res.laps) html+=`<div><span>Laps</span><span>${res.laps}</span></div>`;
      html+=`</div>`;
    } else {
      html+=`<div class="extra">Result data loading or unavailable.</div>`;
    }
  } else {
    // schedule
    html+=`<div class="schead">Schedule · UAE time</div>`;
    if(sess){
      const order=[["FP1","FP1"],["SQ","Sprint Quali"],["FP2","FP2"],["FP3","FP3"],["SP","Sprint"],["Q","Qualifying"],["R","Race"]];
      order.forEach(([k,lbl])=>{ if(sess[k]) html+=`<div class="sess ${k==='R'?'race':''}"><span class="n">${lbl}</span><span class="t">${fmtUAEday(sess[k])} ${fmtUAEtime(sess[k])}</span></div>`; });
      html+=`<div class="tz">GST · UTC+4</div>`;
    } else {
      html+=`<div class="sess race"><span class="n">Race day</span><span class="t">${r.date}</span></div><div class="tz">Live session times need a connection</div>`;
    }
  }
  card.innerHTML=html;
  cardLayer.appendChild(card);
  card._float={ang:-0.5,rad:430,spd:0.16,bobA:14,bobS:0.6,ph:Math.random()*6};
  const ln=document.createElementNS("http://www.w3.org/2000/svg","line");
  ln.setAttribute("stroke","rgba(255,255,255,.22)");ln.setAttribute("stroke-width","1.2");ln.setAttribute("stroke-dasharray","3 5");
  lineLayer.appendChild(ln);
  requestAnimationFrame(()=>card.classList.add("show"));
  selected={data:r,card,line:ln};
}
function clearCard(){cardLayer.innerHTML="";lineLayer.innerHTML="";selected=null;}

/* interaction */
canvas.addEventListener("click",e=>{
  const rect=canvas.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1; mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(markers.map(m=>m.hit));
  if(hits.length){const r=markers[hits[0].object.userData.idx].data;
    const phi=(90-r.lat)*Math.PI/180,theta=(r.lng+180)*Math.PI/180;
    targetRotY=Math.PI/2-theta;targetRotX=Math.max(-1.0,Math.min(1.0,Math.PI/2-phi));buildCard(r);}
  else clearCard();
});
const hoverLabel=document.getElementById("hoverLabel");
canvas.addEventListener("mousemove",e=>{
  if(dragging)return;
  const rect=canvas.getBoundingClientRect();
  mouse.x=((e.clientX-rect.left)/rect.width)*2-1; mouse.y=-((e.clientY-rect.top)/rect.height)*2+1;
  ray.setFromCamera(mouse,camera);
  const hits=ray.intersectObjects(markers.map(m=>m.hit));
  if(hits.length){const r=markers[hits[0].object.userData.idx].data;
    hoverLabel.innerHTML=`${flagSVG(r.flag)}${r.gp.replace(' Grand Prix','')}`;
    hoverLabel.style.left=(e.clientX-canvas.getBoundingClientRect().left/1+12)+"px";
    hoverLabel.style.top=(e.clientY-canvas.getBoundingClientRect().top-8)+"px";
    hoverLabel.style.opacity=1;canvas.style.cursor="pointer";}
  else{hoverLabel.style.opacity=0;canvas.style.cursor="grab";}
});

let dragging=false,px=0,py=0;
canvas.addEventListener("mousedown",e=>{dragging=true;px=e.clientX;py=e.clientY;targetRotY=targetRotX=null;});
addEventListener("mouseup",()=>dragging=false);
addEventListener("mousemove",e=>{if(!dragging)return;
  globeGroup.rotation.y+=(e.clientX-px)*0.005;globeGroup.rotation.x+=(e.clientY-py)*0.005;
  globeGroup.rotation.x=Math.max(-1.2,Math.min(1.2,globeGroup.rotation.x));px=e.clientX;py=e.clientY;});

/* ====== countdown ====== */
let nextRoundNum=null;
function renderCountdown(){
  const r=RACES.find(x=>x.round===nextRoundNum);
  if(!r){document.getElementById("cdGp").textContent="Season complete";document.getElementById("cdClock").textContent="—";return;}
  document.getElementById("cdFlag").textContent=flagEmoji(r.flag);
  document.getElementById("cdGp").textContent=r.gp.replace(' Grand Prix','');
  const sess=sessionMap[r.round];
  const rd = sess&&sess.R ? sess.R : new Date(r.date+"T13:00:00+04:00");
  const diff=rd-new Date();
  if(diff<=0){document.getElementById("cdClock").textContent="LIVE / now";return;}
  const days=Math.floor(diff/(1000*60*60*24)),hrs=Math.floor((diff%(1000*60*60*24))/(1000*60*60)),mins=Math.floor((diff%(1000*60*60))/(1000*60));
  document.getElementById("cdClock").textContent=`${days}d ${hrs}h ${mins}m`;
}

/* ====== live data fetch (Jolpica) ====== */
const API="https://api.jolpi.ca/ergast/f1/2026";
async function fetchJSON(url){
  const res=await fetch(url,{cache:"no-store"});
  if(!res.ok) throw new Error("http "+res.status);
  return res.json();
}
function parseSessions(race){
  const out={};
  const map={FirstPractice:"FP1",SecondPractice:"FP2",ThirdPractice:"FP3",Qualifying:"Q",SprintQualifying:"SQ",Sprint:"SP"};
  for(const k in map){ if(race[k]&&race[k].date&&race[k].time){ out[map[k]]=toUAE(race[k].date,race[k].time); } }
  if(race.date&&race.time) out.R=toUAE(race.date,race.time);
  return out;
}
async function loadSchedule(){
  try{
    const j=await fetchJSON(API+"/races/?format=json");
    const list=j.MRData.RaceTable.Races||[];
    list.forEach(race=>{
      const rnd=parseInt(race.round,10);
      sessionMap[rnd]=parseSessions(race);
    });
    renderSchedule();renderCountdown();
    if(selected) buildCard(selected.data);
  }catch(e){ /* keep fixed fallback */ }
}
function podiumFromResults(results){
  const pod=[];
  for(let i=0;i<3 && i<results.length;i++){
    const r=results[i];
    pod.push({pos:r.position,driver:(r.Driver.givenName[0]+". "+r.Driver.familyName),team:r.Constructor.name});
  }
  // pole = grid 1; fastest lap
  let pole=null,fastest=null,laps=null;
  results.forEach(r=>{ if(r.grid==="1") pole=r.Driver.familyName;
    if(r.FastestLap&&r.FastestLap.rank==="1") fastest=r.Driver.familyName+" "+(r.FastestLap.Time?r.FastestLap.Time.time:"");
    if(r.laps) laps=r.laps;});
  return {podium:pod,pole,fastest,laps};
}
async function loadResults(round){
  try{
    const j=await fetchJSON(`${API}/${round}/results/?format=json`);
    const races=j.MRData.RaceTable.Races;
    if(races&&races[0]&&races[0].Results){ resultMap[round]=podiumFromResults(races[0].Results); }
  }catch(e){}
}
async function loadDoneResults(){
  const done=RACES.filter(r=>r.status==="done").map(r=>r.round);
  for(const rnd of done){ await loadResults(rnd); }
  if(selected&&selected.data.status==="done") buildCard(selected.data);
}
let standMode="subtle";
let lastDrivers=[], lastTeams=[];
function rowStyle(col){ return standMode==="bold"
  ? `background:linear-gradient(90deg,${hexA(col,.34)},${hexA(col,.10)});border-left:4px solid ${col};`
  : ""; }
function renderDrivers(){
  const el=document.getElementById("driversBody");
  if(!lastDrivers.length){return;}
  el.innerHTML=lastDrivers.map(d=>{
    const col=teamColor(d.team);
    return `<div class="trow" style="${rowStyle(col)}"><span class="pos">${d.pos}</span>

      <span class="who">${d.name}<small>${d.team}</small></span>
      <span class="pts">${d.pts}<small>pts</small></span></div>`;}).join("");
}
function renderTeams(){
  const el=document.getElementById("teamsBody");
  if(!lastTeams.length){return;}
  el.innerHTML=lastTeams.map(t=>{
    const col=teamColor(t.name);
    return `<div class="trow" style="${rowStyle(col)}"><span class="pos">${t.pos}</span>
      ${standMode==="bold"?"":`<span class="bar" style="background:${col}"></span>`}
      <span class="who">${t.name}</span>
      <span class="pts">${t.pts}<small>pts</small></span></div>`;}).join("");
}
async function loadStandings(){
  try{
    const j=await fetchJSON(API+"/driverstandings/?format=json");
    const lists=j.MRData.StandingsTable.StandingsLists;
    if(lists&&lists[0]&&lists[0].DriverStandings){
      lastDrivers=lists[0].DriverStandings.slice(0,8).map(d=>({
        pos:d.position,name:`${d.Driver.givenName} ${d.Driver.familyName}`,
        team:d.Constructors[0]?d.Constructors[0].name:"",pts:d.points}));
      document.getElementById("drivers").classList.toggle("bold",standMode==="bold");
      renderDrivers();
    } else document.getElementById("driversBody").innerHTML=`<div class="err">Standings unavailable.</div>`;
  }catch(e){ document.getElementById("driversBody").innerHTML=`<div class="err">Standings unavailable (offline or API limit).</div>`; }
  try{
    const j=await fetchJSON(API+"/constructorstandings/?format=json");
    const lists=j.MRData.StandingsTable.StandingsLists;
    if(lists&&lists[0]&&lists[0].ConstructorStandings){
      lastTeams=lists[0].ConstructorStandings.slice(0,8).map(c=>({
        pos:c.position,name:c.Constructor.name,pts:c.points}));
      document.getElementById("teams").classList.toggle("bold",standMode==="bold");
      renderTeams();
    } else document.getElementById("teamsBody").innerHTML=`<div class="err">Standings unavailable.</div>`;
  }catch(e){ document.getElementById("teamsBody").innerHTML=`<div class="err">Standings unavailable (offline or API limit).</div>`; }
}

/* ====== animate ====== */
const clock=new THREE.Clock();
const pv=new THREE.Vector3();
const CX=()=>960, CY=()=>540; // stage center (1920x1080)
function tick(){
  const t=clock.getElapsedTime();
  if(targetRotY!==null){globeGroup.rotation.y+=(targetRotY-globeGroup.rotation.y)*0.06;globeGroup.rotation.x+=(targetRotX-globeGroup.rotation.x)*0.06;}
  else if(!dragging&&!selected){globeGroup.rotation.y+=0.0012;}
  const p=0.5+0.5*Math.sin(t*3);
  markers.forEach(m=>{
    if(m.isNext){ m.beam.material.opacity=0.5+0.45*p; if(m.ring) m.ring.material.opacity=0.5+0.45*p; m.base.material.opacity=0.6+0.35*p; }
    // keep flags facing the camera a bit (billboard the flag plane)
  });

  // ---- project city labels onto the stage, front-facing + collision cull ----
  const placed=[];
  // sort: next first, then upcoming, then done — so important labels win collisions
  const order=[...cityLabelEls].sort((a,b)=>{
    const rank=s=>s==="next"?0:s==="upcoming"?1:2;
    return rank(a.status)-rank(b.status);
  });
  for(const L of order){
    pv.copy(toVec(L.lat,L.lng,R*1.03));
    pv.applyMatrix4(globeGroup.matrixWorld);
    const worldDir=pv.clone().normalize();
    pv.project(camera);
    const sx=(pv.x*0.5+0.5)*W, sy=(-pv.y*0.5+0.5)*H;
    const camDir=camera.position.clone().normalize();
    const facing=worldDir.dot(camDir);
    let show = facing>0.18 && pv.z<1;
    if(show){
      // collision: skip if too close to an already-placed label
      for(const q of placed){ if(Math.abs(q.x-sx)<92 && Math.abs(q.y-sy)<22){ show=false; break; } }
    }
    if(show){
      L.el.style.opacity=Math.min(1,(facing-0.18)*4);
      L.el.style.left=sx+"px"; L.el.style.top=(sy-26)+"px";
      placed.push({x:sx,y:sy});
    } else {
      L.el.style.opacity=0;
    }
  }
  if(selected){
    const c=selected.card,f=c._float;
    const ang=f.ang+t*f.spd*0.10,bob=Math.sin(t*f.bobS+f.ph)*f.bobA;
    const x=CX()+Math.cos(ang)*f.rad - c.offsetWidth/2;
    const y=CY()+Math.sin(ang)*f.rad*0.6 + bob - c.offsetHeight/2;
    c.style.left=x+"px";c.style.top=y+"px";
    selected.line.setAttribute("x1",CX());selected.line.setAttribute("y1",CY());
    selected.line.setAttribute("x2",x+c.offsetWidth/2);selected.line.setAttribute("y2",y+c.offsetHeight/2);
  }
  renderer.render(scene,camera);requestAnimationFrame(tick);
}
tick();
